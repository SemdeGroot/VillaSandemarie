<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms detection</title>
  </head>
  <body>
    <!--
      Static form definition for the @netlify/plugin-nextjs runtime.
      The actual UI lives in src/components/sections/InquiryForm.tsx.
      Field names here MUST match the React form for submissions to be routed.
    -->
    <form
      name="inquiry"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="inquiry" />
      <input type="text" name="bot-field" />
      <input type="text" name="Naam" />
      <input type="email" name="Email" />
      <input type="tel" name="Telefoon" />
      <input type="number" name="Gasten" />
      <input type="text" name="Aankomst" />
      <input type="text" name="Vertrek" />
      <input type="text" name="Nachten" />
      <textarea name="Bericht"></textarea>
      <input type="text" name="Taal" />
    </form>
  </body>
</html>
